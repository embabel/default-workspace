stepType: action
name: triage-github-issue
description: "Triage a GitHub issue — fetch details, assess feasibility, and decide whether to attempt an automated fix"
inputTypeNames:
  - GitHubIssue
outputTypeName: TriagedIssue
nullable: true
prompt: |
  Triage GitHub issue #{{gitHubIssue.issue}} in {{gitHubIssue.owner}}/{{gitHubIssue.repo}}.

  1. Use the github tool to read the issue:
     gh api repos/{{gitHubIssue.owner}}/{{gitHubIssue.repo}}/issues/{{gitHubIssue.issue}}

  2. Analyze the issue:
     - What is being reported? (bug, feature request, question, improvement)
     - Is the issue clear and actionable?
     - Can it plausibly be fixed by an AI coding agent?

  3. If the issue is NOT suitable for automated fixing, return null.
     Reasons to return null:
     - Feature requests requiring design decisions
     - Issues that are too vague or lack reproduction steps
     - Issues requiring human judgment or external access
     - Already closed issues
     - There is already an open PR addressing the issue

  4. If the issue IS suitable, return a TriagedIssue with:
     - The issue title and body
     - Labels (comma-separated)
     - Your assessment of what needs to be done and how to approach the fix
     - repoPath: set to "/workspace/{{gitHubIssue.repo}}" — the fix action runs
       in a Docker sandbox and will clone the repo there

  Use the progress tool to report your findings as you go.
  Use the communicate tool to tell the user your triage decision and reasoning.
  If the issue is not suitable, communicate why before returning null.

tools:
  - github
  - progress
  - communicate
