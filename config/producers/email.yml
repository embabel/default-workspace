# Vector (semantic) producers backing on-demand email joins.
#
# `relatedThreads` runs through the in-tree EmailThreadVectorSource (index:
# email_threads), which vector-searches the user's email-thread summaries via the
# workspace store — per-user scoped (the userId filter is the privacy boundary,
# since vector search bypasses the Cypher scope rewriter). Works for ANY workspace:
# email-thread summaries + the source are core, no per-user config. The similarity
# score lands on the RELEVANT_TO edge (query it as r.score).
# minScore 0.0 (no floor): the anchor text is a short name/subject, which embeds
# far from topical thread-summary vectors — a high floor returns nothing. Rely on
# top-k + ORDER BY r.score so the caller judges relevance from the score.
- name: relatedThreads
  kind: vector
  index: email_threads
  k: 8
  minScore: 0.0

# `participantThreads` is the FACTUAL sibling: threads the anchor actually PARTICIPATES in, matched
# by email address against the summary's `participantEmails` — never by name similarity. "What do I
# discuss with X" routes here; embedding a bare person NAME retrieves whatever prose sits near the
# name in vector space (a famous namesake's subject matter), which fabricates discussions the person
# was never part of. The join keys on an identity property so the engine broadens it to every alias.
- name: participantThreads
  kind: participant
  index: email_threads
  k: 25
  identityField: participantEmails
