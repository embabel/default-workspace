# The daily briefing — a file-authored typed PROGRAM lens (Lens<P, BriefingView>).
# The class lives in src/briefing.lens.ts (built to briefing.lens.js); its
# retrieve() returns { focus, data } and never calls gateway.lens.*, so retrieval
# is decoupled from presentation. The host driver bridges the result to the focus
# / present surfaces, stamping kind=brief. This replaces the old script-in-YAML
# form: a lens is now a real TS file importing @embabel/runtime-types, not an
# inline blob. (Dynamically-generated lenses are still CypherScript — TS with
# good Cypher in it — run through the same runtime.)
#
# Window args (params): lookbackDays N, or since <ISO date>. Default 30 days.
# Freshness (cache hours(4)) is declared on the class itself.
id: briefing
name: Daily Briefing
description: Your morning brief — what's salient since a chosen point in time.
params:
  - name: since
    type: DATE
    label: Brief since
  - name: lookbackDays
    type: INT
    label: Days to look back
spec:
  kind: module
  className: BriefingLens
  module: briefing.lens.js
  presentKind: brief
