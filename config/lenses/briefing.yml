# The daily briefing as a CypherScript lens. Selection → noise gate → a
# DETERMINISTIC priority ranking computed from the KG (who-matters salience, the
# EMAILED edge; financial consequence, grounded unpaid bills; engagement, thread
# depth; promo demotion, UnsubscribePossibility) → the LLM writes prose that
# RESPECTS the ranking. Deadlines are built from real unpaid bills, not invented.
# Threads where I sent the last message are skipped.
#
# Window args (lensArgs): lookbackDays N, or since <ISO date>. Default 30 days.
id: briefing
name: Daily Briefing
description: Your morning brief — what's salient since a chosen point in time.
params:
  - name: since
    type: DATE
    label: Brief since
  - name: lookbackDays
    type: INT
    label: Days to look back
spec:
  kind: cypherscript
  script: |
    const today = new Date().toISOString().slice(0, 10);
    const days = (typeof lensArgs !== "undefined" && lensArgs.lookbackDays) ? lensArgs.lookbackDays : 30;
    const since = (typeof lensArgs !== "undefined" && lensArgs.since)
      ? lensArgs.since
      : new Date(Date.now() - days * 86400000).toISOString();

    // 1. Selection: recent email signals in the window (lastMessageAt is an ISO
    // string). The body tail holds the most recent messages of the thread.
    let rows = await gateway.kg.query({
      cypher: `MATCH (s:EmailSignal) WHERE s.lastMessageAt > $since
               RETURN s.id AS id, s.subject AS subject, s.from AS sender,
                      coalesce(s.messageCount, 1) AS msgs,
                      right(coalesce(s.bodyText, ''), 4000) AS body
               ORDER BY s.lastMessageAt DESC LIMIT 40`,
      params: JSON.stringify({ since }),
    });

    // 2. Me — id (for the EMAILED salience edge) + addresses (to skip threads I
    // answered last). Both come from the user node, so nothing is hardcoded.
    const meRows = await gateway.kg.query({
      cypher: `MATCH (me:AssistantUser) RETURN me.id AS id, me.email AS email, me.emails AS others, me.timeZone AS timeZone`,
      params: JSON.stringify({}),
    });
    const me = (meRows && meRows[0]) || {};
    const myId = me.id || "";
    // Meeting times are ALWAYS shown in the USER's zone, never the meeting's
    // (which is the creator's). `start` is stored UTC.
    const userTz = me.timeZone || "UTC";
    const myAddrs = new Set();
    if (me.email) myAddrs.add(String(me.email).toLowerCase());
    (me.others || []).forEach(e => e && myAddrs.add(String(e).toLowerCase()));
    const addrOf = (s) => { const m = String(s || "").match(/<([^>]+)>/); return (m ? m[1] : String(s || "")).toLowerCase().trim(); };
    if (myAddrs.size) rows = rows.filter(r => !myAddrs.has(addrOf(r.sender)));

    const recentMsg = (body) => { const b = String(body || "").split(/-{3}\s[^-].*?\s-{3}/).map(s => s.trim()).filter(Boolean); return b.length ? b[b.length - 1] : String(body || ""); };
    // Cut legal/disclaimer footers so they don't drown the actual message.
    const stripFooter = (t) => { const s = String(t); const cut = s.search(/\n\s*(-{2,}\s*$|This (e-?mail|message)\b|Disclaimer\b|Confidential|KPMG International\b|\*{5,}|Sent from my |Get Outlook)/im); return cut > 40 ? s.slice(0, cut) : s; };
    const snippet = (r, n) => stripFooter(recentMsg(r.body)).replace(/\s+/g, " ").slice(0, n);

    // 3. Action-state gate, judged by the BODY: does the person still owe an
    // action, is it resolved/informational, or is it noise? This is what stops a
    // closed thread ("thanks, confirmed, we'll update our records") being flagged.
    let kept = [];
    if (rows.length) {
      const verdicts = await gateway.ai.classify({
        instruction: "Classify each email by its LATEST MESSAGE (shown first), NOT its subject — thread subjects like 'Action Required' persist even after the matter is closed, so ignore them. 'needs-action' = the person still must DO something (reply, pay, decide, sign). 'fyi' = the latest message shows the matter is already resolved, acknowledged, or closed — e.g. the other party writes 'Great, thank you for confirming, we will update our records' — or it is purely informational with nothing to do. 'skip' = bulk, promotional, upsell, or automated noise.",
        items: rows.map(r => `${snippet(r, 300)}  «subject: ${r.subject || "(no subject)"}»`),
        categories: "needs-action,fyi,skip",
        role: "best",
      });
      const stateByIdx = new Map((verdicts || []).map(v => [v.index, v.category]));
      kept = rows.map((r, i) => Object.assign({}, r, { actionState: stateByIdx.get(i) || "fyi" }))
                 .filter(r => r.actionState !== "skip");
    }

    // Upcoming meetings — next 7 days, deterministic, formatted in each meeting's
    // own timezone (start is stored UTC). Independent of email, so it shows even
    // on a quiet inbox day. (Calendar nodes are scoped separately from email.)
    const nowIso = new Date().toISOString();
    const weekEndIso = new Date(Date.now() + 7 * 86400000).toISOString();
    const meetRows = await gateway.kg.query({
      cypher: `MATCH (m:MeetingSignal) WHERE m.start >= $now AND m.start <= $weekEnd
               RETURN m.id AS id, m.subject AS title, m.start AS start, m.location AS location, m.timeZone AS tz
               ORDER BY m.start ASC LIMIT 8`,
      params: JSON.stringify({ now: nowIso, weekEnd: weekEndIso }),
    });
    const fmtTime = (iso, tz) => { try { return new Intl.DateTimeFormat('en-AU', { timeZone: tz || 'UTC', weekday: 'short', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' }).format(new Date(iso)); } catch (e) { return String(iso).replace('T', ' ').slice(0, 16) + ' UTC'; } };
    const mSeen = new Set();
    const schedule = (meetRows || []).filter(m => { const k = (m.title || "") + "|" + m.start; if (mSeen.has(k)) return false; mSeen.add(k); return true; })
      .map(m => ({ time: fmtTime(m.start, userTz), title: m.title || "(meeting)", kind: null, note: m.location ? String(m.location).slice(0, 80) : null }));
    // Upcoming meetings are first-class context entities — push them into focus
    // (alongside the email-thread entities below) so chat-with-lens can act on
    // them. Collected here so they're focused even on a quiet-inbox day.
    let focusIds = (meetRows || []).map(m => m.id).filter(Boolean);

    let brief;
    if (!kept.length) {
      brief = { date: today, headline: "A quiet morning", dek: "Nothing pressing in your inbox right now.",
                leadStory: { title: "Clear runway", body: "No salient mail to brief on — a good window for focused work." },
                schedule: schedule, openLoops: [], deadlines: [], closingThought: null };
    } else {
      const keptIds = kept.map(r => r.id);

      // 4. DETERMINISTIC RANKING. Per thread: who-matters (max EMAILED weight to a
      // participant), financial consequence (a grounded UNPAID bill), engagement
      // (thread depth), minus a promo penalty.
      const enrich = await gateway.kg.query({
        cypher: `MATCH (e:EmailSignal) WHERE e.id IN $ids
                 OPTIONAL MATCH (e:EmailSignal)-[:HAS_PARTICIPANT]->(p:Person)
                 OPTIONAL MATCH (me:Person {id:$meId})-[r:EMAILED]->(p:Person)
                 OPTIONAL MATCH (bill:Bill)-[:GROUNDED_IN]->(e:EmailSignal)
                 RETURN e.id AS id,
                        max(coalesce(r.messageCount, 0)) AS salience,
                        count(DISTINCT bill) AS bills,
                        max(CASE WHEN coalesce(bill.isPaid, false) THEN 1 ELSE 0 END) AS billPaid`,
        params: JSON.stringify({ ids: keptIds, meId: myId }),
      });
      const eById = {}; (enrich || []).forEach(x => eById[x.id] = x);

      const promoRows = await gateway.kg.query({
        cypher: `MATCH (u:UnsubscribePossibility) RETURN collect(DISTINCT toLower(u.senderAddress)) AS addrs`,
        params: JSON.stringify({}),
      });
      const promo = new Set(((promoRows && promoRows[0] && promoRows[0].addrs) || []).filter(Boolean));

      const maxSal = Math.max(1, ...kept.map(r => (eById[r.id] && eById[r.id].salience) || 0));
      kept.forEach(r => {
        const e = eById[r.id] || {};
        const sal = (e.salience || 0) / maxSal;
        const eng = Math.min(1, Math.log2(1 + (r.msgs || 1)) / 4);
        const fin = (e.bills > 0 && !e.billPaid) ? 1 : 0;
        const isPromo = promo.has(addrOf(r.sender)) ? 1 : 0;
        const resolved = (r.actionState === "fyi") ? 1 : 0;
        r.score = 0.45 * sal + 0.20 * eng + 0.30 * fin - 0.40 * isPromo - 0.25 * resolved;
        r.signals = { salience: e.salience || 0, threadDepth: r.msgs || 1, unpaidBill: !!fin, promo: !!isPromo };
      });
      kept.sort((a, b) => b.score - a.score);
      kept.forEach(r => { r.priority = r.score >= 0.45 ? "high" : (r.score >= 0.15 ? "medium" : "low"); });

      // Focus the entities of the ranked threads.
      const ent = await gateway.kg.query({
        cypher: `MATCH (e:EmailSignal) WHERE e.id IN $ids
                 OPTIONAL MATCH (e:EmailSignal)-[:HAS_PARTICIPANT]->(person:Person)
                 OPTIONAL MATCH (e:EmailSignal)-[:HAS_PARTICIPANT]->(org:Organization)
                 OPTIONAL MATCH (bill:Bill)-[:GROUNDED_IN]->(e:EmailSignal)
                 RETURN collect(DISTINCT person.id) AS people, collect(DISTINCT org.id) AS orgs, collect(DISTINCT bill.id) AS bills`,
        params: JSON.stringify({ ids: keptIds }),
      });
      const er = (ent && ent[0]) || {};
      focusIds.push(...(er.people || []), ...(er.orgs || []), ...(er.bills || []));

      // 5. DEADLINES — deterministic, from real unpaid bills due recently/soon.
      const floor = new Date(Date.now() - 30 * 86400000).toISOString().slice(0, 10);
      const weekEnd = new Date(Date.now() + 7 * 86400000).toISOString().slice(0, 10);
      const billRows = await gateway.kg.query({
        cypher: `MATCH (bill:Bill) WHERE coalesce(bill.isPaid, false) = false AND bill.dueDate >= $floor
                 OPTIONAL MATCH (bill:Bill)-[:BILLED_BY]->(org:Organization)
                 RETURN bill.id AS id, bill.name AS name, bill.dueDate AS due, bill.amount AS amount, bill.currency AS ccy, org.name AS vendor
                 ORDER BY bill.dueDate ASC LIMIT 8`,
        params: JSON.stringify({ floor }),
      });
      const deadlines = (billRows || []).map(b => {
        const overdue = String(b.due) < today;
        const urgency = overdue ? "today" : (String(b.due) <= weekEnd ? "this week" : "later");
        const amt = (b.amount != null) ? ` ${b.ccy || ""} ${b.amount}`.replace(/\s+/g, " ").trim() : "";
        return { title: `${b.vendor || b.name || "Bill"}${amt ? " — " + amt : ""}`, due: (overdue ? "overdue " : "") + b.due, urgency, why: "Unpaid bill" };
      });
      // Focus the deadline bills so they render as Bill components under Deadlines.
      focusIds.push(...(billRows || []).map(b => b.id).filter(Boolean));

      // 6. Editorial — prose that RESPECTS the supplied ranking + deadlines.
      const items = kept.map(r => ({ priority: r.priority, state: r.actionState, subject: r.subject, from: r.sender, signals: r.signals, body: snippet(r, 600) }));
      const completion = await gateway.ai.complete({
        prompt: `Write a person's morning brief. Items are ranked by IMPORTANCE (priority high|medium|low) from who-matters salience, financial consequence, and engagement. Use the ranking for ORDER and for the lead story — but whether something is an OPEN LOOP is decided by its 'state', NOT its priority:
    - openLoops: ONLY items whose state is "needs-action", and ONLY the few that genuinely matter — aim for 3 to 6, most important first (high → today, medium → this week). Do NOT list every needs-action item; omit minor or routine ones.
    - An item whose state is "fyi" is already resolved/acknowledged/informational — NEVER list it as an open loop or a deadline. Mention it only as brief context in the dek or lead if it is genuinely notable.
    - The lead story is the most important item overall (highest priority), which may be needs-action or a significant fyi.
    - For deadlines, use ONLY the supplied list; never invent one.
    Reply with STRICT JSON only (no markdown), exactly this shape:
    {"date":"${today}","headline":"<=60 chars","dek":"1-2 sentences","leadStory":{"title":"3-6 words","body":"2-4 sentences"},"schedule":[],"openLoops":[{"title":"5-10 words","urgency":"today|this week|whenever"}],"deadlines":[],"closingThought":null}
    Name real people and items; never invent.
    Ranked items: ${JSON.stringify(items)}
    Supplied deadlines: ${JSON.stringify(deadlines)}`,
        role: "best",
      });
      if (completion && typeof completion === "object") {
        brief = completion;
      } else {
        const text = String(completion);
        try {
          brief = JSON.parse(text.replace(/^```(json)?/i, "").replace(/```$/, "").trim());
        } catch (e) {
          brief = { date: today, headline: "Your morning brief", dek: text.slice(0, 160),
                    leadStory: { title: "Today", body: text.slice(0, 400) },
                    schedule: [], openLoops: [], deadlines: [], closingThought: null };
        }
      }
      brief.deadlines = deadlines; // deterministic — never a fabricated deadline
      brief.schedule = schedule;   // deterministic — real upcoming meetings
    }
    brief.kind = "brief";
    // The brief renders as typed components in the host: focused MeetingSignals
    // as the Schedule, unpaid Bills as Deadlines, the ranked People in focus. The
    // host reads these section labels/order; the editorial prose (headline, dek,
    // lead story, closing) is the header above them.
    brief.sections = [
      { label: "Schedule", type: "MeetingSignal" },
      { label: "Deadlines", type: "Bill" },
      { label: "In focus", type: "Person" },
    ];
    // Focus everything salient — upcoming meetings always, plus the ranked
    // threads' people/orgs/bills when the inbox wasn't quiet.
    await gateway.lens.focus({ ids: Array.from(new Set(focusIds.filter(Boolean))) });
    await gateway.lens.present({ content: JSON.stringify(brief) });
