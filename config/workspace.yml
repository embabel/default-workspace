# Workspace configuration — overrides application.yml defaults.
version: 1

# Active personality — directory name under behaviour/personalities/
activePersonality: marvin

chat:
  model: gpt-4.1-mini

actionCompilerLlm:
  model: gpt-4.1

memoryLlm:
  model: gpt-4.1-mini

apiExplorerLlm:
  model: gpt-4.1

toolRouterLlm:
  model: gpt-4.1-mini

# Ranker — runs once per chat turn to (a) score whether the user's message
# matches a registered goal, and (b) extract the goal's typed inputs.
# Both are tight prompts at temperature 0; a small fast model is right.
rankerLlm:
  model: gpt-4.1-nano

# Vibe coder (app builder) — primary and fallback coding LLM. These are set
# explicitly so the Settings > App Builder UI shows them as the current value
# rather than "System default". Override per workspace if you want different
# models or tuning.
codingLlm:
  model: claude-sonnet-4-6
  # timeout: 3m   # override if vibe coder times out on complex apps
fallbackCodingLlm:
  model: claude-opus-4-6
  # timeout: 5m
# codingModelFallbackAfterFailures: 2
