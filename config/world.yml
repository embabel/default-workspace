# World configuration — overrides application.yml defaults.
version: 1

# Active personality — directory name under behaviour/personalities/
activePersonality: adaptive

# Runtime LLMs are selected by ROLE (mapped to a model in Settings → LLM
# Roles / application.yml embabel.models.llms). The roles below resolve to
# the same models these previously pinned directly, so effective models are
# unchanged: chat_cheap → gpt-4.1-mini, chat_best → gpt-4.1, routing → gpt-4.1-nano.
chat:
  role: chat_cheap

actionCompilerLlm:
  model: gpt-4.1

memoryLlm:
  role: chat_cheap

apiExplorerLlm:
  role: chat_best

toolRouterLlm:
  model: gpt-4.1-mini

# Ranker — runs once per chat turn to (a) score whether the user's message
# matches a registered goal, and (b) extract the goal's typed inputs.
# Both are tight prompts at temperature 0; a small fast model is right.
rankerLlm:
  role: routing

# Vibe coder (app builder) — primary and fallback coding LLM, selected by
# ROLE (mapped to a model in Settings → LLM Roles / application.yml
# embabel.models.llms). code_best → claude-sonnet-4-6 (unchanged primary);
# code_cheap → gpt-4.1-mini (the fallback now follows the code_cheap role
# rather than pinning a model). Repoint either role in LLM Roles to change
# the effective model without editing this file.
codingLlm:
  role: code_best
fallbackCodingLlm:
  role: code_cheap
# codingModelFallbackAfterFailures: 2
